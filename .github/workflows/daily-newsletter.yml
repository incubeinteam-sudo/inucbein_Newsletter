name: Daily Newsletter — IncubeIn Digest

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST (4:30 AM UTC)
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily newsletter
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.NEXT_PUBLIC_BASE_URL }}/api/send-newsletter"